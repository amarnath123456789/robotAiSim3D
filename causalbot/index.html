<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CausalBot</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0a; overflow: hidden; font-family: monospace; }
      canvas { display: block; }

      #ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #status-bar {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 6px 18px;
        color: #aaa;
        font-size: 12px;
        letter-spacing: 0.05em;
      }

      #memory-log {
        position: absolute;
        top: 16px;
        left: 16px;
        width: 200px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .memory-item {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 4px;
        border-left: 2px solid #333;
        background: rgba(0,0,0,0.5);
        color: #666;
      }
      .memory-item.success { border-color: #1D9E75; color: #1D9E75; }
      .memory-item.fail    { border-color: #E24B4A; color: #E24B4A; }

      #skill-log {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 200px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .skill-item {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 4px;
        background: rgba(0,0,0,0.5);
        border-left: 2px solid #534AB7;
        color: #AFA9EC;
      }
      .skill-item.new { border-color: #EF9F27; color: #FAC775; }

      #input-wrap {
        position: absolute;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: all;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      #instruction {
        width: 400px;
        padding: 10px 18px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 24px;
        color: #fff;
        font-family: monospace;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      #instruction::placeholder { color: #444; }
      #instruction:focus { border-color: rgba(255,255,255,0.4); }
      #instruction:disabled { opacity: 0.4; }

      #approve-panel {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.85);
        border: 1px solid rgba(255,200,100,0.3);
        border-radius: 12px;
        padding: 14px 20px;
        display: none;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        pointer-events: all;
        min-width: 300px;
      }

      #approve-panel.visible { display: flex; }

      #approve-title {
        font-size: 12px;
        color: #FAC775;
        letter-spacing: 0.05em;
      }

      #approve-skill-name {
        font-size: 14px;
        font-weight: bold;
        color: #fff;
      }

      #approve-btns {
        display: flex;
        gap: 10px;
      }

      .approve-btn {
        padding: 6px 20px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.2);
        background: transparent;
        color: #fff;
        font-family: monospace;
        font-size: 12px;
        cursor: pointer;
        pointer-events: all;
        transition: background 0.15s;
      }
      .approve-btn:hover { background: rgba(255,255,255,0.1); }
      .approve-btn.yes { border-color: #1D9E75; color: #1D9E75; }
      .approve-btn.yes:hover { background: rgba(29,158,117,0.15); }
      .approve-btn.no  { border-color: #E24B4A; color: #E24B4A; }
      .approve-btn.no:hover  { background: rgba(226,75,74,0.15); }

      #tooltip {
        position: absolute;
        background: rgba(0,0,0,0.8);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 11px;
        color: #ccc;
        pointer-events: none;
        display: none;
        max-width: 200px;
      }

      #thought-sidebar {
        position: absolute;
        top: 80px;
        left: 16px;
        width: 260px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        pointer-events: none;
        z-index: 100;
        opacity: 0;
        transition: opacity 0.4s;
      }

      #thought-sidebar.visible {
        opacity: 1;
      }

      .thought-header {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #FAC775;
        margin-bottom: 2px;
        padding-left: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .thought-header::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #FAC775;
        box-shadow: 0 0 6px #FAC775;
        animation: pulse-dot 1.5s ease-in-out infinite;
      }

      @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.4; transform: scale(0.7); }
      }

      .thought-step {
        font-size: 11px;
        padding: 8px 12px 8px 14px;
        background: rgba(10, 10, 18, 0.82);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-left: 2px solid transparent;
        border-radius: 8px;
        color: #888;
        line-height: 1.5;
        transform: translateX(-14px);
        opacity: 0;
        transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .thought-step.active {
        transform: translateX(0);
        opacity: 1;
        color: #ccc;
        border-left-color: #FAC775;
      }

      /* reasoning = first step, slightly brighter */
      .thought-step:first-child.active {
        color: #e0e0e0;
        border-left-color: #c084fc;
        background: rgba(192, 132, 252, 0.08);
      }

      /* goal = last step, green tint */
      .thought-step:last-child.active {
        border-left-color: #1D9E75;
        color: #5eead4;
        background: rgba(29, 158, 117, 0.07);
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div id="perception-mode-indicator" onclick="window.__togglePerception()" style="
        position: absolute;
        top: 16px;
        right: 220px;
        padding: 5px 14px;
        border-radius: 20px;
        border: 1px solid #4488ff;
        color: #4488ff;
        font-size: 11px;
        font-family: monospace;
        cursor: pointer;
        pointer-events: all;
        background: rgba(0,0,0,0.5);
        transition: all 0.2s;
      ">🧠 Omniscient</div>
      <div id="status-bar">Ready</div>
      <div id="memory-log"></div>
      <div id="skill-log"></div>

      <div id="approve-panel">
        <div id="approve-title">New skill invented</div>
        <div id="approve-skill-name"></div>
        <div id="approve-btns">
          <button class="approve-btn yes" id="btn-approve">Save permanently</button>
          <button class="approve-btn no"  id="btn-reject">Discard</button>
        </div>
      </div>

      <div id="input-wrap">
        <input id="instruction" type="text" placeholder="tell the robot what to do..." />
      </div>

      <div id="tooltip"></div>
      <div id="thought-sidebar">
        <div class="thought-header">Chain of Thought</div>
        <div id="thought-list"></div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
